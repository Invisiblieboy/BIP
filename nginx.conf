user www-data;
worker_processes auto;
pid /run/nginx.pid;

error_log /var/log/nginx/error.log;

events {
        worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    sendfile on;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_certificate /etc/letsencrypt/live/biptoken.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biptoken.xyz/privkey.pem;

    add_header 'Access-Control-Allow-Origin' * always;
    proxy_cache_path /tmp/cache levels=1:2 keys_zone=my_cache:10m;


    proxy_buffering     on;
    proxy_redirect      off;

    proxy_ignore_headers Expires Cache-Control X-Accel-Expires;
    proxy_ignore_headers Set-Cookie;

    proxy_cache my_cache;
    proxy_cache_valid 3s;

    server {
        listen 443 ssl;
        server_name  biptoken.xyz www.biptoken.xyz;

        return 302 https://app.biptoken.xyz;
    }
    server {
        listen 443 ssl;
        server_name api.biptoken.xyz www.api.biptoken.xyz;

        location / {
            proxy_pass         http://127.0.0.1:8000/;
            proxy_redirect     off;
        }
    }
    server {
        listen 443 ssl;
        server_name app.biptoken.xyz www.app.biptoken.xyz;

        location / {
            root /usr/dev/BIP/Web_app/dist/;
            try_files $uri $uri/ /index.html;
        }
    }
    server {
        listen 443 ssl;
        server_name nft.biptoken.xyz www.nft.biptoken.xyz;

        proxy_buffering     on;
        proxy_redirect      off;

        proxy_ignore_headers Expires Cache-Control X-Accel-Expires;
        proxy_ignore_headers Set-Cookie;

        proxy_cache my_cache;
        proxy_cache_valid 24h;

        location / {
            proxy_pass         http://127.0.0.1:8100/;
        }
        location ~* \.(jpg|jpeg|gif|png)$ {
            root         /usr/dev/BIP/NFT/static/;
        }
    }
    server {
        listen 443 ssl;
        server_name static.biptoken.xyz www.static.biptoken.xyz;

        proxy_buffering     on;
        proxy_redirect      off;

        proxy_ignore_headers Expires Cache-Control X-Accel-Expires;
        proxy_ignore_headers Set-Cookie;

        proxy_cache my_cache;
        proxy_cache_valid 24h;

        location ~* \.(jpg|jpeg|gif|png)$ {
            root         /usr/dev/BIP/Static/;
        }
    }
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}